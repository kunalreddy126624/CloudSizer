version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ALLOCATOR_DATABASE_URL: postgresql://cloudsizer:cloudsizer@postgres:5432/cloudsizer
      NOODLE_DATABASE_URL: postgresql://cloudsizer:cloudsizer@postgres:5432/cloudsizer
      NOODLE_ALLOW_SQLITE_FALLBACK: "false"
      ALLOCATOR_TERRAFORM_ARTIFACT_DIR: /app/app/data/allocator_artifacts
      ALLOCATOR_MOCK_CLOUD_CONTROL_PLANE: "true"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8068:8068"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8068
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cloudsizer
      POSTGRES_USER: cloudsizer
      POSTGRES_PASSWORD: cloudsizer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
